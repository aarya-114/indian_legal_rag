name: RAG Eval Pipeline

# on:
#   pull_request:
#     branches: [main]
#   push:
#     branches: [main]

on:
  workflow_dispatch:
    inputs:
      run-eval:
        description: "Trigger the RAG evaluation pipeline"
        required: true
        default: "true"

jobs:
  evaluate:
    runs-on: ubuntu-latest

    # ✅ GLOBAL ENV (available to ALL steps)
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      PYTHONPATH: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache processed data and ChromaDB
        id: data-cache
        uses: actions/cache@v4
        with:
          path: |
            data/processed
            data/chroma_db
          key: legal-rag-data-v1

      - name: Run ingestion pipeline (if cache missing)
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: |
          python src/ingestion/data_loader.py
          python src/ingestion/text_cleaner.py
          python src/chunking/legal_chunker.py

      - name: Build ChromaDB embeddings (if cache missing)
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: |
          python src/embeddings/embedder.py

      - name: Run evaluation
        run: |
          python src/evaluation/eval_runner.py

      - name: Run score gate
        run: |
          python src/evaluation/score_gate.py data/eval/eval_results.json

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: data/eval/eval_results.json