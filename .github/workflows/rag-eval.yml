name: RAG Eval Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache processed data and ChromaDB
        id: data-cache
        uses: actions/cache@v4
        with:
          path: |
            data/processed
            data/chroma_db
          key: legal-rag-data-v1

      - name: Run ingestion pipeline (if cache missing)
        if: steps.data-cache.outputs.cache-hit != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          PYTHONPATH=. python src/ingestion/data_loader.py
          PYTHONPATH=. python src/ingestion/text_cleaner.py
          PYTHONPATH=. python src/chunking/legal_chunker.py

      - name: Build ChromaDB embeddings (if cache missing)
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: |
          PYTHONPATH=. python src/embeddings/embedder.py

      - name: Run evaluation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          PYTHONPATH=. python src/evaluation/eval_runner.py

      - name: Run score gate
        run: |
          PYTHONPATH=. python src/evaluation/score_gate.py data/eval/eval_results.json

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: data/eval/eval_results.json